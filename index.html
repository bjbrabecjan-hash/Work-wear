<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workwear Size Form</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f4f6f8;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #667085;
      --line: #d7dde5;
      --brand: #1f4e79;
      --brand-dark: #173b5c;
      --field: #f9fafb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    .page {
      width: min(100%, 840px);
      margin: 0 auto;
      padding: 40px 20px;
    }

    .form-card {
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 42px rgba(23, 32, 42, 0.08);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 28px 32px;
      background: #eef3f8;
      border-bottom: 4px solid var(--brand);
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 54px;
      height: 54px;
      flex: 0 0 auto;
      border-radius: 8px;
      background: var(--brand);
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .header-title {
      flex: 1;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--brand);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .meta {
      min-width: 150px;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .content {
      padding: 32px;
    }

    .intro {
      max-width: 620px;
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
    }

    .field {
      min-width: 0;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #344054;
      font-size: 13px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid #c8d0da;
      border-radius: 6px;
      background: var(--field);
      color: var(--ink);
      font: inherit;
      transition: border-color 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--brand);
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(31, 78, 121, 0.16);
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      padding: 22px 32px 30px;
      background: #fbfcfd;
      border-top: 1px solid var(--line);
    }

    button {
      min-height: 44px;
      padding: 0 20px;
      border: 0;
      border-radius: 6px;
      background: var(--brand);
      color: #ffffff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background 150ms ease, transform 150ms ease;
    }

    button:hover {
      background: var(--brand-dark);
    }

    button:active {
      transform: translateY(1px);
    }

    @media (max-width: 680px) {
      .page {
        padding: 20px 12px;
      }

      .header,
      .content,
      .actions {
        padding-left: 20px;
        padding-right: 20px;
      }

      .header {
        align-items: flex-start;
        flex-direction: column;
      }

      .meta {
        text-align: left;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      body {
        background: #ffffff;
      }

      .page {
        width: 100%;
        padding: 0;
      }

      .form-card {
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }

      .actions {
        display: none;
      }

      input,
      select {
        background: #ffffff;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <form class="form-card">
      <header class="header">
        <div class="brand-mark" aria-hidden="true">WW</div>
        <div class="header-title">
          <p class="eyebrow">Employee Equipment</p>
          <h1>Workwear Size Form</h1>
        </div>
        <div class="meta">Document ID<br>WW-SIZE-001</div>
      </header>

      <section class="content">
        <p class="intro">
          Please complete the sizing details below. The selected sizes will be used for workwear and safety footwear ordering.
        </p>

        <div class="grid">
          <div class="field full">
            <label for="full-name">Full Name</label>
            <input id="full-name" name="full-name" type="text" autocomplete="name">
          </div>

          <div class="field">
            <label for="shoe-size">Shoe Size</label>
            <select id="shoe-size" name="shoe-size">
              <option>US 6 &rarr; EU 38</option>
              <option>US 7 &rarr; EU 39</option>
              <option>US 8 &rarr; EU 41</option>
              <option>US 9 &rarr; EU 42</option>
              <option>US 10 &rarr; EU 43</option>
              <option>US 11 &rarr; EU 45</option>
            </select>
          </div>

          <div class="field">
            <label for="workwear-size">Workwear Size</label>
            <select id="workwear-size" name="workwear-size">
              <option>XS &rarr; 44&ndash;46</option>
              <option>S &rarr; 46&ndash;48</option>
              <option>M &rarr; 48&ndash;50</option>
              <option>L &rarr; 50&ndash;52</option>
              <option>XL &rarr; 52&ndash;54</option>
              <option>XXL &rarr; 54&ndash;56</option>
            </select>
          </div>

          <div class="field">
            <label for="t-shirt-size">T-shirt Size</label>
            <select id="t-shirt-size" name="t-shirt-size">
              <option>XS</option>
              <option>S</option>
              <option>M</option>
              <option>L</option>
              <option>XL</option>
              <option>XXL</option>
            </select>
          </div>

          <div class="field">
            <label for="form-date">Date</label>
            <input id="form-date" name="form-date" type="date">
          </div>
        </div>
      </section>

      <div class="actions">
        <button type="button" onclick="window.print()">Download / Save as PDF</button>
      </div>
    </form>
  </main>
  <script>
    const dateField = document.getElementById("form-date");

    if (dateField) {
      dateField.valueAsDate = new Date();
    }
  </script>
</body>
</html>
